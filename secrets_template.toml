# .streamlit/secrets.toml 模板文件
# 部署至 Streamlit Cloud 时，请将以下内容完整复制到后台应用的 "Advanced Settings" -> "Secrets" 文本框中。

# ==========================================
# 1. 跨端狙击报警邮箱设置 (SMTP 邮件引擎)
# ==========================================
SMTP_SERVER = "smtp.gmail.com"  # 发件服务器 (Outlook 可改为 smtp.office365.com)
SMTP_PORT = 587                 # 大多数 SMTP 的端点
SENDER_EMAIL = "your_email@gmail.com" 

# ⚠️ 极度重要：请勿在这里填入你的真实邮箱密码！
# 由于涉及机器调用，请登录 Gmail/Outlook 账户设置，开启二级验证，并生成一个「应用专用密码 (App Password)」。它通常是 16 位字母组合无空格。
EMAIL_PASSWORD = "your_16_digit_app_password_here"


# ==========================================
# 2. 哨兵智脑大语言模型配置 (LLM API Keys)
# ==========================================
# 填入你在此前准备的 Gemini 的高管 API
GEMINI_API_KEY = "AIzaSy_YOUR_GEMINI_API_KEY_HERE"

# 如果你想扩展 / 切换给 OpenAI 使用：
# OPENAI_API_KEY = "sk-proj-YOUR_OPENAI_API_KEY_HERE"
